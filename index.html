<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudinary Transformer | MLH 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh}
header{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,165,0,0.2);padding:16px 32px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
main{max-width:1100px;margin:0 auto;padding:40px 20px}
.config-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:32px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px;color:#fff;width:100%}
.btn{padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer;border:none;background:linear-gradient(135deg,#ff6b35,#ffd700);color:#000}
.transforms{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:32px}
.transform-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;cursor:pointer;text-align:center}
.transform-card:hover{border-color:#ff6b35}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.preview-box{background:rgba(255,255,255,0.04);border-radius:16px;padding:20px}
img{width:100%;border-radius:10px}
</style>
</head>
<body>
<header><h1>Cloudinary Image Transformer</h1></header>
<main>
    <div class="config-panel">
        <h2>⚙️ Configuration</h2>
        <div class="form-row">
            <div><label>Cloud Name</label><input type="text" value="demo"></div>
            <div><label>Public ID</label><input type="text" value="sample"></div>
        </div>
        <button class="btn">🚀 Apply</button>
    </div>
    <div class="transforms">
        <div class="transform-card">📐<h3>Crop</h3></div>
        <div class="transform-card">⬛<h3>Gray</h3></div>
        <div class="transform-card">🟫<h3>Sepia</h3></div>
        <div class="transform-card">🌫️<h3>Blur</h3></div>
        <div class="transform-card">🎨<h3>Art</h3></div>
        <div class="transform-card">✂️<h3>NoBG</h3></div>
        <div class="transform-card">👤<h3>Face</h3></div>
        <div class="transform-card">🖼️<h3>Cartoon</h3></div>
    </div>
    <div class="preview-grid">
        <div class="preview-box"><h3>Original</h3><img src="https://res.cloudinary.com/demo/image/upload/sample.jpg"></div>
        <div class="preview-box"><h3>Transformed</h3><img src="https://res.cloudinary.com/demo/image/upload/e_cartoonify/sample.jpg"></div>
    </div>
</main>
</body>
</html>
