<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudinary Image Transformer | MLH GenAI 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0d0d1a;color:#e0e0e0;min-height:100vh}
header{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,165,0,0.2);padding:16px 32px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.4);padding:4px 12px;border-radius:20px;font-size:0.75rem;color:#ff6b35}
main{max-width:1100px;margin:0 auto;padding:40px 20px}
.btn{padding:12px 24px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#ffd700);color:#000}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.4)}
.transforms{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:32px}
.transform-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.3s;text-align:center}
.transform-card:hover,.transform-card.active{border-color:#ff6b35;background:rgba(255,107,53,0.1)}
.transform-card .t-icon{font-size:1.8rem;margin-bottom:8px}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.preview-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px}
.preview-box img{width:100%;border-radius:10px;max-height:300px;object-fit:contain}
.config-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:32px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
input[type=text]{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 14px;color:#e0e0e0;font-size:0.9rem;width:100%}
</style>
</head>
<body>
<header>
    <div style="font-size:1.6rem">☁️</div>
    <h1>Cloudinary Image Transformer</h1>
    <span class="badge">MLH GenAI 2025</span>
</header>
<main>
    <div class="config-panel">
        <h2 style="margin-bottom:16px">⚙️ Cloudinary Configuration</h2>
        <div class="form-row">
            <div><label style="font-size:0.8rem;color:#888">Cloud Name</label><input type="text" id="cloudName" value="demo"></div>
            <div><label style="font-size:0.8rem;color:#888">Public ID</label><input type="text" id="publicId" value="sample"></div>
        </div>
        <button class="btn btn-primary" onclick="apply()">🚀 Apply Transformations</button>
    </div>
    <div class="transforms">
        <div class="transform-card active" onclick="sel(this,'w_600,h_400,c_fill')"><div class="t-icon">📐</div><h3>Crop</h3></div>
        <div class="transform-card" onclick="sel(this,'e_grayscale')"><div class="t-icon">⬛</div><h3>Gray</h3></div>
        <div class="transform-card" onclick="sel(this,'e_sepia')"><div class="t-icon">🟫</div><h3>Sepia</h3></div>
        <div class="transform-card" onclick="sel(this,'e_blur:800')"><div class="t-icon">🌫️</div><h3>Blur</h3></div>
        <div class="transform-card" onclick="sel(this,'e_art:athena')"><div class="t-icon">🎨</div><h3>Athena</h3></div>
        <div class="transform-card" onclick="sel(this,'e_background_removal')"><div class="t-icon">✂️</div><h3>NoBG</h3></div>
        <div class="transform-card" onclick="sel(this,'w_300,h_300,c_thumb,g_face,r_max')"><div class="t-icon">👤</div><h3>Face</h3></div>
        <div class="transform-card" onclick="sel(this,'e_cartoonify')"><div class="t-icon">🖼️</div><h3>Cartoon</h3></div>
    </div>
    <div class="preview-grid">
        <div class="preview-box"><h3>Original</h3><img id="orig" src="https://res.cloudinary.com/demo/image/upload/sample.jpg"></div>
        <div class="preview-box"><h3>Transformed</h3><img id="trans" src="https://res.cloudinary.com/demo/image/upload/w_600,h_400,c_fill/sample.jpg"></div>
    </div>
</main>
<script>
let curr='w_600,h_400,c_fill';
function sel(el,t){document.querySelectorAll('.transform-card').forEach(c=>c.classList.remove('active'));el.classList.add('active');curr=t;apply();}
function apply(){
    const c=document.getElementById('cloudName').value;
    const i=document.getElementById('publicId').value;
    document.getElementById('orig').src=`https://res.cloudinary.com/${c}/image/upload/${i}.jpg`;
    document.getElementById('trans').src=`https://res.cloudinary.com/${c}/image/upload/${curr}/${i}.jpg`;
}
</script>
</body>
</html>
