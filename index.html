<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudinary AI | Ayan Hussain</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Outfit',sans-serif;background:#050505;color:#fff;margin:0;padding:40px}
        h1{font-size:2.5rem;text-align:center;margin-bottom:40px;background:linear-gradient(to right, #ff6b35, #ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
        .card{background:#111;border:1px solid #222;padding:25px;border-radius:20px;text-align:center;transition:0.3s}
        .card:hover{border-color:#ff6b35;transform:translateY(-5px)}
        .icon{font-size:2.5rem;margin-bottom:15px}
        .preview{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px;max-width:900px;margin-left:auto;margin-right:auto}
        .img-box{background:#111;padding:15px;border-radius:20px;border:1px solid #222}
        img{width:100%;border-radius:10px}
        .label{color:#666;font-size:0.8rem;margin-bottom:10px;text-transform:uppercase}
    </style>
</head>
<body>
    <h1>Cloudinary API Transformer</h1>
    <div class="grid">
        <div class="card"><div class="icon">🎨</div><h3>Cartoonify</h3><p>AI-powered cartoon filter</p></div>
        <div class="card"><div class="icon">✂️</div><h3>BG Removal</h3><p>Remove backgrounds instantly</p></div>
        <div class="card"><div class="icon">🌫️</div><h3>Blur</h3><p>Smart focus effects</p></div>
        <div class="card"><div class="icon">📐</div><h3>Face Crop</h3><p>AI-aware face detection</p></div>
    </div>
    <div class="preview">
        <div class="img-box"><div class="label">Original</div><img src="https://res.cloudinary.com/demo/image/upload/sample.jpg"></div>
        <div class="img-box"><div class="label">Transformed</div><img src="https://res.cloudinary.com/demo/image/upload/e_cartoonify/sample.jpg"></div>
    </div>
</body>
</html>
